name: CI/CD Pipeline

on:
  push:
    branches:
      - master

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}   # doit valoir: said2003
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build Spring Boot JAR
        working-directory: springboot/app
        run: mvn -q -DskipTests clean package

      - name: Build and Push Backend image
        uses: docker/build-push-action@v5
        with:
          context: ./springboot/app
          push: true
          provenance: false
          tags: docker.io/${{ secrets.DOCKERHUB_USERNAME }}/springboot-app:latest

      - name: Build and Push Frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./angular-app
          push: true
          provenance: false
          tags: docker.io/${{ secrets.DOCKERHUB_USERNAME }}/angular-app:latest

      - name: Docker Compose up
        env:
          BACKEND_IMAGE: docker.io/${{ secrets.DOCKERHUB_USERNAME }}/springboot-app:latest
          FRONTEND_IMAGE: docker.io/${{ secrets.DOCKERHUB_USERNAME }}/angular-app:latest
        run: |
          docker compose up -d
          docker ps
