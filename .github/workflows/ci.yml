name: CI/CD Pipeline

on:
  push:
    branches:
      - master

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # Java pour le build Spring Boot + cache Maven
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          registry: docker.io
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # Build du JAR Spring Boot
      - name: Build Spring Boot JAR
        working-directory: springboot/app
        run: mvn -q -DskipTests clean package

      # Build & Push Backend
      - name: Build and Push Backend image
        uses: docker/build-push-action@v5
        with:
          context: ./springboot/app
          push: true
          provenance: false
          tags: |
            docker.io/YOUR_NAMESPACE/springboot-app:latest

      # Build & Push Frontend
      - name: Build and Push Frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./angular-app
          push: true
          provenance: false
          tags: |
            docker.io/YOUR_NAMESPACE/angular-app:latest

      # Démarrer l'app avec Compose en utilisant les images poussées
      - name: Docker Compose up
        env:
          BACKEND_IMAGE: docker.io/YOUR_NAMESPACE/springboot-app:latest
          FRONTEND_IMAGE: docker.io/YOUR_NAMESPACE/angular-app:latest
        run: |
          # Si ton docker-compose.yml utilise 'image: ${BACKEND_IMAGE}' / 'image: ${FRONTEND_IMAGE}',
          # ces variables seront prises en compte automatiquement.
          docker compose -f docker-compose.yml up -d
          sleep 20
          docker ps

      # Ping simple du backend (adapter le port si besoin)
      - name: Health check backend
        run: |
          set -e
          curl -fsS -I http://localhost:8080 || (docker logs $(docker ps --format '{{.Names}}') ; exit 1)
